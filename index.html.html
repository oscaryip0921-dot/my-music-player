<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chow Chow 專屬音樂台 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --bg-color: #0f0f11;
            --accent-color: #ffffff;
            --cd-border-color: #2a2a2a; /* 這是你要求的較淺色粗邊 */
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #252528 0%, #0f0f11 100%);
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100dvh;
            overflow: hidden;
            box-sizing: border-box;
            padding: 40px 0;
        }

        .header { text-align: center; z-index: 10; }
        h1 { font-size: 1.2rem; letter-spacing: 5px; font-weight: 200; margin: 0; color: var(--accent-color); }
        .subtitle { font-size: 0.7rem; color: #666; letter-spacing: 3px; margin-top: 5px; }

        .player-core {
            position: relative;
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lighting-effect {
            position: absolute;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.2;
            z-index: 1;
            pointer-events: none;
        }

        .swiper { width: 100%; height: 400px; z-index: 2; display: flex; align-items: center; }
        
        /* 浮動動畫：加在 Slide 上，避免影響 CD 旋轉 */
        @keyframes slide-float {
            0%, 100% { margin-top: 0; }
            50% { margin-top: -20px; }
        }

        .swiper-slide { 
            display: flex; justify-content: center; align-items: center; width: 300px; 
            transition: transform 0.6s ease;
        }

        /* 只有在播放中且是活動項時才飄浮 */
        .swiper-slide.playing.swiper-slide-active {
            animation: slide-float 3s ease-in-out infinite;
        }

        /* CD 盤面設計 */
        .cd-disk {
            width: 290px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: 
                linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.05) 100%),
                repeating-radial-gradient(circle, #222 0, #222 1px, #000 1.5px, #111 2.5px);
            border: 12px solid var(--cd-border-color); /* 調回你要求的粗邊顏色 */
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.5s ease;
        }

        .swiper-slide-active .cd-disk {
            transform: scale(1.05); /* 選中時稍微放大 */
        }

        .cd-label {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #f0f0f0, #ffffff);
            display: flex; align-items: center; justify-content: center;
            text-align: center; color: #000; font-size: 0.65rem; font-weight: 900;
            padding: 12px; box-sizing: border-box; border: 4px solid #111;
        }

        /* 旋轉動畫：只負責旋轉 */
        @keyframes rotateCD {
            from { transform: scale(1.05) rotate(0deg); }
            to { transform: scale(1.05) rotate(360deg); }
        }

        /* 播放中執行旋轉 */
        .playing .cd-disk {
            animation: rotateCD 10s linear infinite !important;
        }

        /* Loading */
        .loading-placeholder {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 290px; height: 290px; border-radius: 50%;
            background: #111; z-index: 20; display: flex; align-items: center; justify-content: center;
        }
        .fade-out { opacity: 0; transition: opacity 0.5s; pointer-events: none; }

        .controls-panel { width: 85%; max-width: 450px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border-radius: 30px; padding: 20px; border: 1px solid rgba(255,255,255,0.08); text-align: center; z-index: 10; margin-bottom: 20px; }
        #song-title { font-size: 0.85rem; margin-bottom: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
        audio { width: 100%; height: 32px; filter: invert(1) opacity(0.8); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Chow Chow EMO Play List</h1>
        <div class="subtitle">PREMIUM CLASSIC SERIES 2026</div>
    </div>

    <div class="player-core">
        <div id="loader" class="loading-placeholder"><div class="subtitle">LOADING</div></div>
        <div id="light-effect" class="lighting-effect"></div>
        <div class="swiper">
            <div class="swiper-wrapper" id="cd-wrapper"></div>
        </div>
    </div>

    <div class="controls-panel">
        <div id="song-title">SELECT A RECORD</div>
        <audio id="main-player" controls loop crossorigin="anonymous"></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz43aRnB_lziZ2Bc3_-R3lzEsDqznOqhkAxqKl8kslHJN0aHLkx6zrx-KVp3H3PaA4fkQ/exec';
        const player = document.getElementById('main-player');
        const lightEffect = document.getElementById('light-effect');
        const titleDisplay = document.getElementById('song-title');
        
        let audioContext, analyser, dataArray, isInitialized = false;

        async function fetchPlaylist() {
            const loader = document.getElementById('loader');
            try {
                const res = await fetch(SCRIPT_URL);
                const songs = await res.json();
                renderCDs(songs);
                loader.classList.add('fade-out');
            } catch (e) { console.error(e); }
        }

        function renderCDs(songs) {
            const wrapper = document.getElementById('cd-wrapper');
            wrapper.innerHTML = songs.map(song => `
                <div class="swiper-slide">
                    <div class="cd-disk" data-url="${song.url || song.Url}" data-title="${song.title || song.Title}">
                        <div class="cd-label">${song.title || song.Title}</div>
                    </div>
                </div>
            `).join('');

            const swiper = new Swiper('.swiper', {
                effect: 'coverflow',
                centeredSlides: true,
                slidesPerView: 'auto',
                coverflowEffect: { rotate: 20, stretch: 0, depth: 100, modifier: 1.5, slideShadows: false },
                on: {
                    slideChangeTransitionEnd: function () {
                        const activeSlide = this.slides[this.activeIndex];
                        const cd = activeSlide.querySelector('.cd-disk');
                        if (cd) playSong(cd.dataset.url, cd.dataset.title, activeSlide);
                    }
                }
            });

            wrapper.addEventListener('click', (e) => {
                const slide = e.target.closest('.swiper-slide');
                if (slide) swiper.slideTo(Array.from(slide.parentElement.children).indexOf(slide));
            });
        }

        function playSong(url, title, slideEl) {
            if (!url) return;
            if (!isInitialized) { initVisualizer(); isInitialized = true; }
            if (audioContext?.state === 'suspended') audioContext.resume();

            const playUrl = url.replace(/\.3gp$/, '.mp3');
            if (player.src !== playUrl) {
                player.src = playUrl;
                player.load();
                player.play().then(() => {
                    titleDisplay.innerText = title;
                }).catch(e => { console.log("Retry..."); player.src = url; player.play(); });
            }

            updateAnimationState(slideEl);
        }

        function updateAnimationState(activeSlide) {
            document.querySelectorAll('.swiper-slide').forEach(s => s.classList.remove('playing'));
            if (activeSlide) activeSlide.classList.add('playing');
        }

        function initVisualizer() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaElementSource(player);
                analyser = audioContext.createAnalyser();
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                animateGlow();
            } catch(e) { console.error(e); }
        }

        function animateGlow() {
            requestAnimationFrame(animateGlow);
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            lightEffect.style.transform = `scale(${1 + (avg / 120)})`;
            lightEffect.style.opacity = 0.2 + (avg / 150);
        }

        // 當按下暫停時停止旋轉
        player.onpause = () => document.querySelectorAll('.swiper-slide').forEach(s => s.classList.remove('playing'));
        player.onplay = () => {
            const activeSlide = document.querySelector('.swiper-slide-active');
            if (activeSlide) activeSlide.classList.add('playing');
        };

        fetchPlaylist();
    </script>
</body>
</html>
