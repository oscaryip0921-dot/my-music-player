<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chow Chow 專屬音樂台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-color: #3b82f6;
            --glass: rgba(255, 255, 255, 0.05);
        }

       body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 修改這裡：使用 dvh 以適配行動裝置工具欄 */
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            /* 增加 padding 防止內容過於貼近邊緣 */
            padding: 20px 0;
            box-sizing: border-box;
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; letter-spacing: 2px; }
        .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 40px; }

        /* Swiper 容器設定 */
        .swiper {
            flex-grow: 1; 
            width: 100%;
            display: flex;
            align-items: center;
        }

        .swiper-slide {
            background-position: center;
            background-size: cover;
            width: 300px; /* CD 大小 */
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* CD 樣式 */
        .cd-disk {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1c1c1e 0%, #000 100%);
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* CD 中心孔與標籤 */
        .cd-label {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.7rem;
            padding: 10px;
            color: #000;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        /* 正在播放時的旋轉動畫 */
        .playing .cd-disk {
            animation: rotateCD 5s linear infinite;
        }

        @keyframes rotateCD {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 控制面板 */
        .controls {
            margin-bottom: env(safe-area-inset-bottom); /* 適配手勢導航列 */
            padding-bottom: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        audio {
            width: 100%;
            filter: invert(1); /* 讓原生播放器變暗色調 */
            opacity: 0.7;
        }

        .now-playing {
            margin-top: 15px;
            font-weight: 200;
            color: var(--accent-color);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>Chow Chow 專屬音樂台</h1>
    <div class="subtitle">Chow Chow專屬</div>

    <div class="swiper">
        <div class="swiper-wrapper" id="cd-wrapper">
            </div>
    </div>

    <div class="controls">
        <div id="current-song-name" class="now-playing">請左右滑動挑選 CD</div>
        <audio id="main-player" controls></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz43aRnB_lziZ2Bc3_-R3lzEsDqznOqhkAxqKl8kslHJN0aHLkx6zrx-KVp3H3PaA4fkQ/exec';
        const player = document.getElementById('main-player');
        const cdWrapper = document.getElementById('cd-wrapper');
        const songNameDisplay = document.getElementById('current-song-name');

        // 音量記憶
        const savedVolume = localStorage.getItem('chow_player_volume');
        if (savedVolume !== null) player.volume = savedVolume;
        player.addEventListener('volumechange', () => {
            localStorage.setItem('chow_player_volume', player.volume);
        });

        // 初始化 Swiper 3D 效果
        let swiper;

        async function fetchPlaylist() {
            try {
                const response = await fetch(SCRIPT_URL);
                const songs = await response.json();
                renderCDs(songs);
            } catch (error) {
                console.error("載入失敗", error);
            }
        }

        function renderCDs(songs) {
            cdWrapper.innerHTML = '';
            songs.forEach((song, index) => {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.innerHTML = `
                    <div class="cd-disk" onclick="playSong('${song.url}', '${song.title}', this)">
                        <div class="cd-label">${song.title}</div>
                    </div>
                `;
                cdWrapper.appendChild(slide);
            });

            // 初始化或更新 Swiper
            swiper = new Swiper('.swiper', {
                effect: 'coverflow',
                grabCursor: true,
                centeredSlides: true,
                slidesPerView: 'auto',
                coverflowEffect: {
                    rotate: 50,
                    stretch: 0,
                    depth: 100,
                    modifier: 1,
                    slideShadows: true,
                },
                on: {
                    slideChange: function () {
                        // 換 CD 時停止旋轉特效 (可選)
                        document.querySelectorAll('.swiper-slide').forEach(el => el.classList.remove('playing'));
                    }
                }
            });
        }

        function playSong(url, title, element) {
            player.src = url;
            player.play();
            songNameDisplay.innerText = "Playing: " + title;
            
            // 移除所有旋轉，只給當前點擊的 CD 加入旋轉
            document.querySelectorAll('.swiper-slide').forEach(el => el.classList.remove('playing'));
            element.parentElement.classList.add('playing');
        }

        // 監聽播放/暫停，控制轉動
        player.onplay = () => document.querySelector('.swiper-slide-active')?.classList.add('playing');
        player.onpause = () => document.querySelector('.swiper-slide-active')?.classList.remove('playing');

        fetchPlaylist();
    </script>
</body>
</html>
