<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chow Chow 專屬音樂台 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --bg-color: #0f0f11;
            --surface-color: #1a1a1d;
            --accent-color: #ffffff; /* 2026 流行純白光感 */
            --glow-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            /* 2026 經典黑色背景質感：加入微弱的噪點與漸層 */
            background-image: radial-gradient(circle at center, #252528 0%, #0f0f11 100%);
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100dvh; /* 解決行動端 URL 遮擋 */
            overflow: hidden;
            box-sizing: border-box;
            padding: 40px 0;
        }

        /* 標題區：時尚窄體設計 */
        .header {
            text-align: center;
            z-index: 10;
        }
        h1 { font-size: 1.2rem; letter-spacing: 5px; font-weight: 200; margin: 0; color: var(--accent-color); text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .subtitle { font-size: 0.7rem; color: #666; letter-spacing: 3px; margin-top: 5px; }

        /* CD 與光暈容器 */
       .player-core {
            position: relative;
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible; /* 確保光暈不被切掉 */
        }

        /* 2026 重點：動態光暈 (會隨 JS 控制大小) */
        .lighting-effect {
            position: absolute;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 75%);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.2; /* 基本亮度 */
            transition: transform 0.08s ease-out;
            pointer-events: none;
            z-index: 1;
        }

        .swiper {
            width: 100%;
            height: 400px;
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 300px;
        }

        /* 強化後的 CD 質感：加入更多線條與反射 */
        .cd-disk {
            width: 290px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: 
                linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(255,255,255,0.05) 100%),
                repeating-radial-gradient(circle, #222 0, #222 1px, #000 1.5px, #111 2.5px);
            border: 10px solid #1a1a1a;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.1);
            position: relative;
            cursor: pointer;
            display: flex;         /* 改用 Flex 居中 */
            align-items: center;
            justify-content: center;
            will-change: transform; /* 提升動畫效能 */
        } 

        .cd-label {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e0e0e0, #ffffff);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #000;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 10px;
            box-sizing: border-box;
            border: 4px solid #111;
            pointer-events: none; /* 避免干擾點擊 */
        }

        /* 旋轉動畫 */
        .playing .cd-disk {
            animation: rotateCD 8s linear infinite;
        }

        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 底部控制台：經典灰黑質感 */
        .controls-panel {
            width: 85%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            z-index: 10;
            margin-bottom: 20px;
        }

        #song-title { font-size: 0.9rem; margin-bottom: 15px; font-weight: 300; letter-spacing: 1px; color: #aaa; }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(1) hue-rotate(180deg) brightness(1.5); /* 讓播放器變銀色感 */
        }

        /* 2026 虛擬加載骨架 */
            .loading-placeholder {
                position: absolute; /* 關鍵：脫離文檔流 */
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%); /* 完美居中 */
                width: 290px;
                height: 290px;
                border-radius: 50%;
                background: radial-gradient(circle, #222 0%, #111 100%);
                border: 2px solid rgba(255, 255, 255, 0.05);
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                z-index: 20; /* 確保在最上層 */
                pointer-events: none; /* 防止遮擋點擊 */
            }
            
            .loading-placeholder::after {
                content: "";
                position: absolute;
                width: 100%;
                height: 100%;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 255, 255, 0.05),
                    transparent
                );
                /* 2026 流行的高速流光感 */
                animation: loading-shimmer 1.5s infinite linear;
            }
            
            @keyframes loading-shimmer {
                0% { transform: translateX(-100%) skewX(-15deg); }
                100% { transform: translateX(100%) skewX(-15deg); }
            }
            
            /* 隱藏加載屏的過渡 */
            .fade-out {
                opacity: 0;
                transition: opacity 0.5s ease-out;
                pointer-events: none;
            }
    </style>
</head>
<body>
    <div class="header">
        <h1>Chow Chow EMO Play List</h1>
        <div class="subtitle">PREMIUM CLASSIC SERIES 2026</div>
    </div>

        <div class="player-core">
            <div id="loader" class="loading-placeholder">
                <div class="subtitle" style="margin: 0; opacity: 0.5;">LOADING...</div>
            </div>
            
            <div id="light-effect" class="lighting-effect"></div>
            <div class="swiper">
                <div class="swiper-wrapper" id="cd-wrapper"></div>
            </div>
        </div>
        <div id="light-effect" class="lighting-effect"></div>
        
        <div class="swiper">
            <div class="swiper-wrapper" id="cd-wrapper">
                </div>
        </div>
    <div class="controls-panel">
        <div id="song-title">CHOOSE A RECORD</div>
        <audio id="main-player" controls loop></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz43aRnB_lziZ2Bc3_-R3lzEsDqznOqhkAxqKl8kslHJN0aHLkx6zrx-KVp3H3PaA4fkQ/exec';
        const player = document.getElementById('main-player');
        const lightEffect = document.getElementById('light-effect');
        const titleDisplay = document.getElementById('song-title');
        
        let audioContext, analyser, dataArray;
        let isInitialized = false; 

        // 初始化音量與音量記憶
        const savedVol = localStorage.getItem('emo_vol') || 0.7;
        player.volume = savedVol;
        player.onvolumechange = () => localStorage.setItem('emo_vol', player.volume);
        // Hide load
        
        // 1. 初始化音訊分析器 (Lighting Effect 的關鍵)
        function initVisualizer() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaElementSource(player);
            analyser = audioContext.createAnalyser();
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 64; // 只需要基礎頻率
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            animateGlow();
        }

        // 2. 讓光暈隨音量跳動
        function animateGlow() {
            requestAnimationFrame(animateGlow);
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
            let average = sum / dataArray.length;
            
            // 調整這兩個係數：讓跳動更明顯
            // 之前可能是 150/255，現在改為 100/150 讓反應更劇烈
            let scale = 1 + (average / 100); 
            let opacity = 0.2 + (average / 150); 
            
            lightEffect.style.transform = `scale(${scale})`;
            lightEffect.style.opacity = opacity;
        }
        async function fetchPlaylist() {
            const loader = document.getElementById('loader');
            try {
                // 開始獲取清單
                const res = await fetch(SCRIPT_URL);
                const songs = await res.json();
                
                // 渲染 CD
                renderCDs(songs);
                
                // 渲染後優雅淡出加載屏
                loader.classList.add('fade-out');
                setTimeout(() => {
                    loader.style.display = 'none'; 
                }, 500);
            } catch (e) { 
                console.error(e);
                const text = loader.querySelector('.subtitle');
                if (text) text.innerText = "NETWORK ERROR";
            }
        }

        function renderCDs(songs) {
    const wrapper = document.getElementById('cd-wrapper');
    
    // 使用 map 結合 join 一次性注入，效能比 forEach append 更好
    wrapper.innerHTML = songs.map(song => `
        <div class="swiper-slide">
            <div class="cd-disk" data-url="${song.url}" data-title="${song.title}">
                <div class="cd-label">${song.title}</div>
            </div>
        </div>
    `).join('');

    const swiper = new Swiper('.swiper', {
        effect: 'coverflow',
        centeredSlides: true,
        slidesPerView: 'auto',
        coverflowEffect: { rotate: 25, stretch: 0, depth: 150, modifier: 1, slideShadows: false },
        on: {
            slideChangeTransitionEnd: function () {
                const activeSlide = this.slides[this.activeIndex];
                const cd = activeSlide.querySelector('.cd-disk');
                if (cd) {
                    // 直接從 dataset 讀取，不再使用 regex 抓 onclick
                    playSong(cd.dataset.url, cd.dataset.title, cd);
                }
            },
            touchStart: () => {
                if (audioContext?.state === 'suspended') audioContext.resume();
            }
        }
    });

    // 點擊 CD 播放
    wrapper.addEventListener('click', (e) => {
        const cd = e.target.closest('.cd-disk');
        if (cd) playSong(cd.dataset.url, cd.dataset.title, cd);
    });
}

function playSong(url, title, el) {
    if (!isInitialized) {
        initVisualizer();
        isInitialized = true;
    }
    
    // 簡潔的格式轉換邏輯
    const playUrl = url.replace(/\.3gp$/, '.mp3');
    
    if (player.src !== playUrl) {
        player.crossOrigin = "anonymous";
        player.src = playUrl;
        player.load();
        
        player.play().then(() => {
            titleDisplay.innerText = title;
        }).catch(err => {
            console.error("Playback failed, trying original URL:", err);
            player.src = url; // 失敗則回退到原 URL
            player.play();
        });
    }

    // 更新播放動畫狀態
    document.querySelectorAll('.swiper-slide').forEach(s => s.classList.remove('playing'));
    el?.parentElement.classList.add('playing');
}

        // 播放狀態與動畫同步
        player.onplay = () => document.querySelector('.swiper-slide-active')?.classList.add('playing');
        player.onpause = () => document.querySelector('.swiper-slide-active')?.classList.remove('playing');

        fetchPlaylist();
    </script>
</body>
</html>
