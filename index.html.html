<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chow Chow 專屬音樂台 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --bg-color: #0f0f11;
            --accent-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #252528 0%, #0f0f11 100%);
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100dvh;
            overflow: hidden;
            box-sizing: border-box;
            padding: 40px 0;
        }

        .header { text-align: center; z-index: 10; }
        h1 { font-size: 1.2rem; letter-spacing: 5px; font-weight: 200; margin: 0; color: var(--accent-color); text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .subtitle { font-size: 0.7rem; color: #666; letter-spacing: 3px; margin-top: 5px; }

        .player-core {
            position: relative;
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .lighting-effect {
            position: absolute;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 75%);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.2;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
            pointer-events: none;
            z-index: 1;
        }

        .swiper { width: 100%; height: 400px; z-index: 2; display: flex; align-items: center; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; width: 300px; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* CD 基礎樣式 */
        .cd-disk {
            width: 290px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: 
                linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(255,255,255,0.05) 100%),
                repeating-radial-gradient(circle, #222 0, #222 1px, #000 1.5px, #111 2.5px);
            border: 10px solid #1a1a1a;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        .cd-label {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #e0e0e0, #ffffff);
            display: flex; align-items: center; justify-content: center;
            text-align: center; color: #000; font-size: 0.7rem; font-weight: 800;
            padding: 10px; box-sizing: border-box; border: 4px solid #111;
        }

        /* 2026 核心動畫：旋轉 + 飄浮 */
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes cd-float {
            0%, 100% { transform: scale(1.1) translateY(0); }
            50% { transform: scale(1.1) translateY(-12px); }
        }

        /* 選中狀態：放大 */
        .swiper-slide-active .cd-disk {
            transform: scale(1.1);
            filter: brightness(1.2);
            box-shadow: 0 40px 80px rgba(0,0,0,1), 0 0 20px rgba(255,255,255,0.1);
        }

        /* 播放狀態：旋轉 + 飄浮 */
        .playing.swiper-slide-active .cd-disk {
            animation: rotateCD 8s linear infinite, cd-float 3s ease-in-out infinite !important;
        }

        /* Loading 效果 */
        .loading-placeholder {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 290px; height: 290px; border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #111 100%);
            z-index: 20; display: flex; align-items: center; justify-content: center;
        }
        .loading-placeholder::after {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: loading-shimmer 1.5s infinite linear;
        }
        @keyframes loading-shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .fade-out { opacity: 0; transition: opacity 0.5s; pointer-events: none; }

        .controls-panel { width: 85%; max-width: 450px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; z-index: 10; margin-bottom: 20px; }
        #song-title { font-size: 0.9rem; margin-bottom: 15px; color: #aaa; letter-spacing: 1px; }
        audio { width: 100%; height: 35px; filter: invert(1) brightness(1.5); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Chow Chow EMO Play List</h1>
        <div class="subtitle">PREMIUM CLASSIC SERIES 2026</div>
    </div>

    <div class="player-core">
        <div id="loader" class="loading-placeholder">
            <div class="subtitle" style="opacity: 0.5;">LOADING...</div>
        </div>
        <div id="light-effect" class="lighting-effect"></div>
        <div class="swiper">
            <div class="swiper-wrapper" id="cd-wrapper"></div>
        </div>
    </div>

    <div class="controls-panel">
        <div id="song-title">SELECT A RECORD</div>
        <audio id="main-player" controls loop crossorigin="anonymous"></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz43aRnB_lziZ2Bc3_-R3lzEsDqznOqhkAxqKl8kslHJN0aHLkx6zrx-KVp3H3PaA4fkQ/exec';
        const player = document.getElementById('main-player');
        const lightEffect = document.getElementById('light-effect');
        const titleDisplay = document.getElementById('song-title');
        
        let audioContext, analyser, dataArray, isInitialized = false;

        async function fetchPlaylist() {
            const loader = document.getElementById('loader');
            try {
                const res = await fetch(SCRIPT_URL);
                const songs = await res.json();
                renderCDs(songs);
                loader.classList.add('fade-out');
                setTimeout(() => loader.style.display = 'none', 500);
            } catch (e) {
                console.error("Fetch Error:", e);
                loader.querySelector('.subtitle').innerText = "NETWORK ERROR";
            }
        }

        function renderCDs(songs) {
            const wrapper = document.getElementById('cd-wrapper');
            // 注意：這裡強制檢查 song 物件屬性名稱，確保與你 GAS 回傳的一致
            wrapper.innerHTML = songs.map(song => `
                <div class="swiper-slide">
                    <div class="cd-disk" data-url="${song.url || song.Url}" data-title="${song.title || song.Title}">
                        <div class="cd-label">${song.title || song.Title}</div>
                    </div>
                </div>
            `).join('');

            const swiper = new Swiper('.swiper', {
                effect: 'coverflow',
                centeredSlides: true,
                slidesPerView: 'auto',
                coverflowEffect: { rotate: 25, stretch: 0, depth: 150, modifier: 1, slideShadows: false },
                on: {
                    slideChangeTransitionEnd: function () {
                        const activeSlide = this.slides[this.activeIndex];
                        const cd = activeSlide.querySelector('.cd-disk');
                        if (cd) playSong(cd.dataset.url, cd.dataset.title, activeSlide);
                    }
                }
            });

            // 點擊也觸發播放
            wrapper.addEventListener('click', (e) => {
                const slide = e.target.closest('.swiper-slide');
                const cd = slide?.querySelector('.cd-disk');
                if (cd) playSong(cd.dataset.url, cd.dataset.title, slide);
            });
        }

        function playSong(url, title, slideEl) {
            if (!url) return;
            if (!isInitialized) { initVisualizer(); isInitialized = true; }
            if (audioContext?.state === 'suspended') audioContext.resume();

            // 視覺閃爍
            lightEffect.style.transition = 'none';
            lightEffect.style.transform = 'scale(2)';
            lightEffect.style.opacity = '0.8';
            setTimeout(() => {
                lightEffect.style.transition = 'transform 0.8s ease-out, opacity 0.8s ease-out';
                lightEffect.style.transform = 'scale(1)';
                lightEffect.style.opacity = '0.2';
            }, 50);

            const playUrl = url.replace(/\.3gp$/, '.mp3');
            if (player.src !== playUrl) {
                player.src = playUrl;
                player.load();
                player.play().then(() => {
                    titleDisplay.innerText = title;
                }).catch(e => {
                    console.log("Auto-play blocked or error, trying fallback...");
                    player.src = url; // 嘗試原始 URL
                    player.play();
                });
            }

            // 同步動畫類名
            document.querySelectorAll('.swiper-slide').forEach(s => s.classList.remove('playing'));
            slideEl.classList.add('playing');
        }

        function initVisualizer() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaElementSource(player);
                analyser = audioContext.createAnalyser();
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                animateGlow();
            } catch(e) { console.error("Visualizer Init Failed", e); }
        }

        function animateGlow() {
            requestAnimationFrame(animateGlow);
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            lightEffect.style.transform = `scale(${1 + (avg / 100)})`;
            lightEffect.style.opacity = 0.2 + (avg / 150);
        }

        // 監控播放器的真實狀態
        player.onplay = () => document.querySelector('.swiper-slide-active')?.classList.add('playing');
        player.onpause = () => document.querySelector('.swiper-slide-active')?.classList.remove('playing');

        fetchPlaylist();
    </script>
</body>
</html>
